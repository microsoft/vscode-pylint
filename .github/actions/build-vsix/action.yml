name: 'Build VSIX'
description: "Build the extension's VSIX"

inputs:
  node_version:
    description: 'Version of Node to install'
    required: true
  python_version:
    description: 'Version of Python to install (minimum supported version)'
    required: false
    default: '3.10'

runs:
  using: 'composite'
  steps:
    - name: Install Node
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: ${{ inputs.node_version }}
        cache: 'npm'

    # Minimum supported version is defined by python_version input
    - name: Use Python ${{ inputs.python_version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: ${{ inputs.python_version }}

    - name: Pip cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-build-vsix-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-build-vsix-

    - name: Upgrade Pip
      run: python -m pip install -U pip
      shell: bash

    # For faster/better builds of sdists.
    - name: Install build pre-requisite
      run: python -m pip install wheel
      shell: bash

    - name: Install nox
      run: python -m pip install nox
      shell: bash

    - name: Run npm ci
      run: npm ci --prefer-offline
      shell: bash

    - name: Install bundled python libraries
      run: python -m nox --session install_bundled_libs
      shell: bash

    # Use the GITHUB_RUN_ID environment variable to update the build number.
    # GITHUB_RUN_ID is a unique number for each run within a repository.
    # This number does not change if you re-run the workflow run.
    - name: Update extension build number
      run: python -m nox --session update_build_number -- $GITHUB_RUN_ID
      shell: bash

    - name: Build VSIX
      run: npm run vsce-package
      shell: bash

    - name: Upload VSIX
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: linter-package
        path: |
          **/*.vsix
        if-no-files-found: error
        retention-days: 7
